<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHASHAFLIX | منصة البث الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #141414;
            color: #ffffff;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* شريط التنقل العلوي */
        .navbar {
            padding: 15px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            max-width: 140px;
            height: auto;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        .nav-link {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: #00f2fe;
            font-weight: bold;
        }

        /* البانر الرئيسي العريض */
        .hero-banner {
            width: 100%;
            height: 45vh;
            background: linear-gradient(to top, #141414 5%, rgba(20,20,20,0.2) 50%, rgba(0,0,0,0.7) 100%), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 4% 30px 4%;
            margin-top: 60px;
        }

        .hero-title {
            font-size: 2.2rem;
            color: #00f2fe;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* صندوق البحث المطور */
        .search-wrapper {
            width: 92%;
            max-width: 500px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 20px;
            border: 2px solid #282828;
            background-color: #181818;
            color: #fff;
            outline: none;
            font-size: 0.95rem;
            text-align: right;
        }

        .search-input:focus { border-color: #00f2fe; }

        .search-btn {
            padding: 0 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #7f00ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* قسم المشغل ومحدد الحلقات */
        .player-section {
            display: none;
            width: 92%;
            max-width: 900px;
            margin: 0 auto 30px auto;
            background-color: #181818;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #282828;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .episodes-controls {
            padding: 15px 20px;
            background-color: #181818;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #282828;
        }

        select {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        /* المحتوى والأقسام */
        .main-container { padding: 0 4%; }
        .section-row { margin-bottom: 35px; }
        .row-title { font-size: 1.3rem; font-weight: bold; color: #fff; margin-bottom: 15px; }
        
        .posters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 18px;
        }

        .movie-card {
            background-color: #181818;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            border: 1px solid #282828;
        }

        .movie-card:hover {
            transform: scale(1.05);
            border-color: #00f2fe;
        }

        .movie-card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background-color: #222;
        }

        .movie-card-title {
            padding: 8px;
            font-size: 0.8rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; }
            .posters-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
            .movie-card img { height: 155px; }
        }
    </style>
</head>
<body>

    <!-- شريط التنقل العلوي -->
    <nav class="navbar">
        <div class="nav-right">
            <img src="logo.png" alt="SHASHAFLIX" class="logo-img" onclick="window.location.reload()">
            <ul class="nav-menu">
                <li><span class="nav-link active" onclick="window.location.reload()">الرئيسية</span></li>
                <li><span class="nav-link" onclick="loadTrending('tv')">مسلسلات وأنمي</span></li>
                <li><span class="nav-link" onclick="loadTrending('movie')">أفلام</span></li>
            </ul>
        </div>
    </nav>

    <!-- البانر الرئيسي -->
    <div class="hero-banner">
        <div class="hero-title">SHASHAFLIX LIVE</div>
        <div style="max-width: 500px; font-size: 0.9rem; color: #e5e5e5;">مرحباً بك في الجيل الجديد لشاشة فلكس. محرك بحث حي يستدعي أحدث الأفلام والمسلسلات والأنميات مباشرة من الخوادم العالمية وبدقة عالية.</div>
    </div>

    <!-- خانة البحث الشاملة والمباشرة -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن أي فيلم أو أنمي بالإنجليزية (مثل: One Piece)...">
        <button class="search-btn" onclick="searchTMDB()">بحث</button>
    </div>

    <!-- المشغل الذكي التلقائي ومحدد الحلقات الحية -->
    <div class="player-section" id="playerSection">
        <div class="video-container">
            <iframe id="mainIframe" src="" allowfullscreen></iframe>
        </div>
        <div class="episodes-controls" id="controlsBox">
            <div style="display:flex; gap:15px; align-items:center;">
                <label>الموسم:</label>
                <select id="seasonSelect" onchange="updateEpisodesList()"></select>
                <label style="margin-right:15px;">الحلقة:</label>
                <select id="episodeSelect" onchange="loadLiveEpisode()"></select>
            </div>
            <div style="font-size:0.8rem; color:#00f2fe;">💡 تفعيل الترجمة: اضغط على زر الترجمة (CC) أو الترس التابع للمشغل واشغل العربية.</div>
        </div>
    </div>

    <!-- منطقة عرض المحتوى والأقسام الذكية -->
    <div class="main-container">
        <div class="section-row" id="tvSection">
            <div class="row-title" id="gridTitle">العروض الشائعة والحديثة الآن</div>
            <div class="posters-grid" id="mainGrid"></div>
        </div>
    </div>

    <script>
        // مفتاح API مجاني وعام لجلب البيانات مباشرة ومجاناً من أكبر قاعدة بيانات أفلام بالعالم
        const apiKey = "844bf0047b679633e5ef264a7c1b4899";
        let currentShowId = "";
        let currentMediaType = "movie";

        // تشغيل الجلب التلقائي لأحدث الأعمال بمجرد فتح المنصة
        window.onload = function() {
            loadTrending('all');
        };

        // دالة جلب أحدث وأقوى الأعمال الحية من السيرفر
        async function loadTrending(type) {
            const grid = document.getElementById('mainGrid');
            const title = document.getElementById('gridTitle');
            grid.innerHTML = "<div style='grid-column:1/-1; text-align:center;'>🔍 جاري تحديث الواجهة بأحدث العروض...</div>";
            
            if(type === 'all') title.textContent = "أحدث المسلسلات والأفلام العالمية والأنمي الرائج اليوم";
            if(type === 'tv') title.textContent = "أحدث مسلسلات الأنمي والدراما التلفزيونية";
            if(type === 'movie') title.textContent = "أحدث الأفلام السينمائية الحالية";

            try {
                const url = `https://api.themoviedb.org/3/trending/${type}/week?api_key=${apiKey}&language=en-US`;
                const res = await fetch(url);
                const data = await res.json();
                renderCards(data.results);
            } catch (err) {
                grid.innerHTML = "<div>خطأ في الاتصال بقاعدة البيانات.</div>";
            }
        }

        // دالة البحث الشاملة في ملايين الأعمال
        async function searchTMDB() {
            const query = document.getElementById('searchInput').value.trim();
            const grid = document.getElementById('mainGrid');
            if(!query) return alert("اكتب اسم العمل أولاً!");

            grid.innerHTML = "<div style='grid-column:1/-1; text-align:center;'>🔍 جاري البحث في خوادم فلكس...</div>";
            document.getElementById('gridTitle').textContent = `نتائج البحث عن: ${query}`;

            try {
                const url = `https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(query)}&language=en-US`;
                const res = await fetch(url);
                const data = await res.json();
                renderCards(data.results);
            } catch (err) {
                grid.innerHTML = "<div>حدث خطأ في البحث.</div>";
            }
        }

        // دالة رسم الكروت وعرض صور البوسترات الحقيقية بدقة عالية
        function renderCards(results) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            
            // تصفية العروض التي لا تمتلك صور بوسترات لضمان واجهة نظيفة 100%
            const cleanResults = results.filter(item => item.poster_path);

            if(cleanResults.length === 0) {
                grid.innerHTML = "<div style='grid-column:1/-1; text-align:center;'>لم نجد نتائج مطابقة، تأكد من الاسم بالإنجليزية.</div>";
                return;
            }

            cleanResults.forEach(item => {
                const title = item.title || item.name;
                const type = item.media_type || (item.first_air_date ? 'tv' : 'movie');
                const imgUrl = `https://image.tmdb.org/t/p/w500${item.poster_path}`;

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${imgUrl}" alt="${title}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'">
                    <div class="movie-card-title">${title}</div>
                `;
                card.onclick = () => startLivePlay(item.id, type);
                grid.appendChild(card);
            });
        }

        // تشغيل الفيديو والتحقق التلقائي من الحلقات والمواسم الحقيقية للعمل
        async function startLivePlay(id, type) {
            const playerSection = document.getElementById('playerSection');
            const controlsBox = document.getElementById('controlsBox');
            const iframe = document.getElementById('mainIframe');
            
            currentShowId = id;
            currentMediaType = type;

            playerSection.style.display = 'block';
            window.scrollTo({ top: playerSection.offsetTop - 100, behavior: 'smooth' });

            if (type === 'movie') {
                controlsBox.style.display = 'none';
                iframe.src = `https://vidsrc.to/embed/movie/${id}`;
            } else {
                controlsBox.style.display = 'flex';
                // جلب بيانات المسلسل الحقيقية لمعرفة عدد مواسمه وحلقاته بالظبط من السيرفر
                try {
                    const url = `https://api.themoviedb.org/3/tv/${id}?api_key=${apiKey}&language=en-US`;
                    const res = await fetch(url);
                    const data = await res.json();

                    const seasonSelect = document.getElementById('seasonSelect');
                    seasonSelect.innerHTML = "";
                    
                    data.seasons.forEach(s => {
                        if(s.season_number > 0) { // استبعاد الحلقات الخاصة والـ Specials
                            seasonSelect.innerHTML += `<option value="${s.season_number}">الموسم ${s.season_number} (${s.episode_count} حلقة)</option>`;
                        }
                    });

                    updateEpisodesList(data.seasons);
                } catch (err) {
                    // حل احتياطي في حال فشل جلب الحلقات الخاصة بالـ API ليعمل بشكل تلقائي ومباشر
                    const seasonSelect = document.getElementById('seasonSelect');
                    seasonSelect.innerHTML = `<option value="1">الموسم 1</option>`;
                    updateEpisodesList([{season_number: 1, episode_count: 50}]);
                }
            }
        }

        // تحديث الحلقات ديناميكياً وبشكل فوري بناءً على خيار الموسم المختار
        async function updateEpisodesList(seasonsData) {
            const seasonSelect = document.getElementById('seasonSelect');
            const episodeSelect = document.getElementById('episodeSelect');
            const selectedSeason = seasonSelect.value;
            
            episodeSelect.innerHTML = "";
            let episodeCount = 24; // رقم افتراضي احتياطي

            if(seasonsData) {
                const currentSeasonObj = seasonsData.find(s => s.season_number == selectedSeason);
                if(currentSeasonObj) episodeCount = currentSeasonObj.episode_count;
            } else {
                // في حال التحديث من خلال الـ HTML نفسه نقرأ النص المكتوب داخل خيار السيزون
                try {
                    const url = `https://api.themoviedb.org/3/tv/${currentShowId}?api_key=${apiKey}&language=en-US`;
                    const res = await fetch(url);
                    const data = await res.json();
                    const currentSeasonObj = data.seasons.find(s => s.season_number == selectedSeason);
                    if(currentSeasonObj) episodeCount = currentSeasonObj.episode_count;
                } catch(e){}
            }

            for (let i = 1; i <= episodeCount; i++) {
                episodeSelect.innerHTML += `<option value="${i}">الحلقة ${i}</option>`;
            }
            loadLiveEpisode();
        }

        // توليد رابط البث النهائي والمضمون وتوجيهه للمشغل
        function loadLiveEpisode() {
            const iframe = document.getElementById('mainIframe');
            const season = document.getElementById('seasonSelect').value;
            const episode = document.getElementById('episodeSelect').value;
            iframe.src = `https://vidsrc.to/embed/tv/${currentShowId}/${season}/${episode}`;
        }
    </script>
</body>
</html>
