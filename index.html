<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHASHAFLIX | واجهة نتفليكس الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* تصميم سينمائي مستوحى بالكامل من Netflix وShashaFlix */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #141414; /* لون خلفية نتفليكس الشهير */
            color: #ffffff;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* الهيدر واللوجو */
        header {
            padding: 20px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            object-fit: contain;
        }

        /* البانر الرئيسي الكبير (Hero Banner) */
        .hero-banner {
            width: 100%;
            height: 55vh;
            background: linear-gradient(to top, #141414 5%, rgba(20,20,20,0.2) 50%, rgba(0,0,0,0.7) 100%), 
                        url('https://image.tmdb.org/t/p/original/69w831Z6MdnG346wYw66A7v7g2z.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 4% 40px 4%;
            margin-bottom: 20px;
        }

        .hero-title {
            font-size: 2.5rem;
            color: #00f2fe;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }

        .hero-desc {
            max-width: 550px;
            font-size: 0.95rem;
            color: #e5e5e5;
            line-height: 1.5;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* منطقة المشغل السري */
        .player-section {
            display: none;
            width: 92%;
            max-width: 900px;
            margin: 0 auto 30px auto;
            background-color: #181818;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #282828;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* لوحة التحكم بالحلقات والمواسم (جديد ومصلح) */
        .episodes-controls {
            padding: 20px;
            background-color: #181818;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 1px solid #282828;
        }

        .selector-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .selector-group label {
            font-weight: bold;
            color: #00f2fe;
        }

        select {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        /* الأقسام والبوسترات */
        .main-container {
            padding: 0 4%;
        }

        .section-row {
            margin-bottom: 35px;
        }

        .row-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            display: inline-block;
        }

        .posters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px;
        }

        .movie-card {
            background-color: #181818;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .movie-card:hover {
            transform: scale(1.06);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        .movie-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .movie-card-title {
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(45deg, #00f2fe, #7f00ff);
            color: #fff;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .hero-banner { height: 40vh; }
            .hero-title { font-size: 1.8rem; }
            .posters-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
            .movie-card img { height: 165px; }
        }
    </style>
</head>
<body>

    <!-- الهيدر الثابت -->
    <header>
        <img src="logo.png" alt="SHASHAFLIX" class="logo-img">
    </header>

    <!-- البانر الكبير بالأعلى (طراز نتفليكس) -->
    <div class="hero-banner">
        <div class="hero-title">ONE PIECE</div>
        <div class="hero-desc">مغامرات لوفي وطاقمه الشهير للبحث عن الكنز الأسطوري ون بيس ليصبح ملك القراصنة. اضغط على البوستر بالأسفل لتشغيل الحلقات فوراً.</div>
    </div>

    <!-- قسم المشغل الذكي ومحدد الحلقات -->
    <div class="player-section" id="playerSection">
        <div class="video-container">
            <iframe id="mainIframe" src="" allowfullscreen></iframe>
        </div>
        
        <!-- أزرار التحكم بالمواسم والحلقات للأنمي والمسلسلات -->
        <div class="episodes-controls" id="controlsBox">
            <div class="selector-group">
                <label>الموسم:</label>
                <select id="seasonSelect" onchange="changeSeason()"></select>
                
                <label style="margin-right: 15px;">الحلقة:</label>
                <select id="episodeSelect" onchange="loadEpisode()"></select>
            </div>
            <div style="font-size: 0.85rem; color: #00f2fe; font-weight: bold;">💡 نصيحة: اضغط على زر CC أو الترس داخل الفيديو لتفعيل الترجمة العربية تلقائياً.</div>
        </div>
    </div>

    <!-- محتوى المنصة الرئيسي -->
    <div class="main-container">
        
        <!-- قسم الأنمي والمسلسلات -->
        <div class="section-row">
            <div class="row-title">أحدث مسلسلات الأنمي والدراما العالمية</div>
            <div class="posters-grid" id="tvGrid"></div>
        </div>

        <!-- قسم الأفلام -->
        <div class="section-row">
            <div class="row-title">أفلام سينمائية مقترحة لك</div>
            <div class="posters-grid" id="movieGrid"></div>
        </div>

    </div>

    <script>
        // قاعدة البيانات الحقيقية للشاشة مع عدد الحلقات والمواسم الفعلي
        const tvShows = [
            { id: "21", type: "tv", title: "One Piece", img: "https://image.tmdb.org/t/p/w500/v9nG0v8aG2Eg8v86I3ubsiZa6vK.jpg", badge: "أنمي", seasons: 1, episodesPerSeason: 1100 },
            { id: "31911", type: "tv", title: "Fullmetal Alchemist: B", img: "https://image.tmdb.org/t/p/w500/u9g9gSbaG2Eg8v86I3ubsiZa6vK.jpg", badge: "أنمي", seasons: 1, episodesPerSeason: 64 },
            { id: "110316", type: "tv", title: "Wednesday", img: "https://image.tmdb.org/t/p/w500/9PFonBhy46wcEpb62Y2u6Glm36G.jpg", badge: "مسلسل", seasons: 1, episodesPerSeason: 8 },
            { id: "1396", type: "tv", title: "Breaking Bad", img: "https://image.tmdb.org/t/p/w500/ztkUQv6v1NZv6J6wSu99Zg68uGE.jpg", badge: "مسلسل", seasons: 5, episodesPerSeason: 13 }
        ];

        const movies = [
            { id: "299534", type: "movie", title: "Avengers: Endgame", img: "https://image.tmdb.org/t/p/w500/or066gT60Bw7u6vYg90uCj7gK96.jpg", badge: "فيلم" },
            { id: "157336", type: "movie", title: "Interstellar", img: "https://image.tmorg/t/p/w500/gEU2vW9Z7786v3t2gGwYZvV6jR9.jpg", badge: "فيلم" },
            { id: "19995", type: "movie", title: "Avatar", img: "https://image.tmdb.org/t/p/w500/kyeqW6vX4w8uW6fjoH6dJhuxv6d.jpg", badge: "فيلم" }
        ];

        // متغيرات تتبع حالة التشغيل الحالية
        let currentShowId = "";
        let currentShowData = null;

        // توليد الكروت في الواجهة
        renderGrid(tvShows, 'tvGrid');
        renderGrid(movies, 'movieGrid');

        function renderGrid(data, gridId) {
            const grid = document.getElementById(gridId);
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <span class="card-badge">${item.badge}</span>
                    <img src="${item.img}" alt="${item.title}">
                    <div class="movie-card-title">${item.title}</div>
                `;
                card.onclick = () => selectMedia(item);
                grid.appendChild(card);
            });
        }

        // اختيار المادة وتجهيز المشغل الحقيقي
        function selectMedia(item) {
            const playerSection = document.getElementById('playerSection');
            const controlsBox = document.getElementById('controlsBox');
            const iframe = document.getElementById('mainIframe');
            
            playerSection.style.display = 'block';
            window.scrollTo({ top: playerSection.offsetTop - 90, behavior: 'smooth' });

            if (item.type === 'movie') {
                // للأفلام: تشغيل فوري بدون أزرار مواسم وحلقات
                controlsBox.style.display = 'none';
                iframe.src = `https://vidsrc.to/embed/movie/${item.id}`;
            } else {
                // للمسلسلات والأنمي: إظهار لوحة اختيار المواسم والحلقات وتوليدها تلقائياً
                controlsBox.style.display = 'flex';
                currentShowId = item.id;
                currentShowData = item;

                // إنشاء خيارات المواسم
                const seasonSelect = document.getElementById('seasonSelect');
                seasonSelect.innerHTML = "";
                for (let i = 1; i <= item.seasons; i++) {
                    seasonSelect.innerHTML += `<option value="${i}">الموسم ${i}</option>`;
                }

                changeSeason(); // توليد الحلقات تلقائياً للموسم الأول
            }
        }

        // تحديث الحلقات بناءً على الموسم المختار
        function changeSeason() {
            const episodeSelect = document.getElementById('episodeSelect');
            episodeSelect.innerHTML = "";
            
            // توليد أرقام الحلقات بناء على عدد الحلقات الفعلي في الداتا
            for (let i = 1; i <= currentShowData.episodesPerSeason; i++) {
                episodeSelect.innerHTML += `<option value="${i}">الحلقة ${i}</option>`;
            }

            loadEpisode(); // تشغيل الحلقة الأولى فوراً
        }

        // بناء الرابط الحقيقي والنهائي لتشغيل الحلقة المطلوبة بدون شاشة سوداء
        function loadEpisode() {
            const iframe = document.getElementById('mainIframe');
            const season = document.getElementById('seasonSelect').value;
            const episode = document.getElementById('episodeSelect').value;

            // الرابط العالمي الدقيق لتشغيل المسلسلات والأنمي عبر الـ ID
            iframe.src = `https://vidsrc.to/embed/tv/${currentShowId}/${season}/${episode}`;
        }
    </script>
</body>
</html>
