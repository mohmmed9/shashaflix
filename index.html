<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SHASHAFLIX</title>
    <style>
        body { background: #141414; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 20px; }
        .card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
        .card div { padding: 10px; font-size: 0.8rem; text-align: center; }
        #player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        iframe { width: 100%; height: 90%; border: none; }
        .close-btn { color: white; padding: 10px; cursor: pointer; display: block; text-align: right; }
    </style>
</head>
<body>

<div id="player-container">
    <span class="close-btn" onclick="document.getElementById('player-container').style.display='none'">إغلاق X</span>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<div class="grid" id="grid"></div>

<script>
    const database = [
        { id: "21", type: "tv", title: "One Piece", img: "https://image.tmdb.org/t/p/w500/v9nG0v8aG2Eg8v86I3ubsiZa6vK.jpg" },
        { id: "1429", type: "tv", title: "Attack on Titan", img: "https://image.tmdb.org/t/p/w500/h6dt7w4gMaMa7gXW5Qv5QwbX.jpg" },
        { id: "94605", type: "tv", title: "Demon Slayer", img: "https://image.tmdb.org/t/p/w500/3w8S57v3gYMaYfdfFt76Qv5QwbX.jpg" }
    ];

    const grid = document.getElementById('grid');
    database.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/200x300?text=SHASHAFLIX'">
            <div>${item.title}</div>
        `;
        div.onclick = () => {
            const frame = document.getElementById('video-frame');
            frame.src = item.type === 'tv' ? `https://vidsrc.to/embed/tv/${item.id}/1/1` : `https://vidsrc.to/embed/movie/${item.id}`;
            document.getElementById('player-container').style.display = 'block';
        };
        grid.appendChild(div);
    });
</script>
</body>
</html>
