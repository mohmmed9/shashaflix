<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHASHAFLIX | شاشة فلكس الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0c0f12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 30px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            max-width: 250px;
            height: auto;
            object-fit: contain;
        }

        header h1 {
            color: #00f2fe;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        header p {
            color: #a0aec0;
            font-size: 0.9rem;
            max-width: 450px;
            line-height: 1.6;
        }

        /* إصلاح صندوق البحث ليكون مرناً ومترتباً صح في الجوال */
        .search-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: row; /* إجبار الترتيب من اليمين لليسار */
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid #1a202c;
            background-color: #1a202c;
            color: #fff;
            font-size: 1rem;
            outline: none;
            text-align: right; /* الكتابة تبدأ من اليمين لراحة المستخدم العربي */
            transition: 0.3s ease;
        }

        .search-input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .search-btn {
            padding: 0 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #0c0f12;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s ease;
        }

        .search-btn:hover {
            transform: scale(1.02);
        }

        .results-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-message {
            text-align: center;
            color: #718096;
            font-size: 1rem;
            padding: 30px;
            border: 1px dashed #1a202c;
            border-radius: 15px;
        }

        .player-wrapper {
            display: none; 
            width: 100%;
            background-color: #1a202c;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid #2d3748;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .servers-section-title {
            padding: 15px 20px 0 20px; 
            font-weight: bold; 
            color: #00f2fe;
            font-size: 1rem;
        }

        .servers-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            padding: 15px;
            background-color: #11151d;
        }

        .server-btn {
            padding: 10px;
            background-color: #1a202c;
            color: #e2e8f0;
            border: 1px solid #2d3748;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
        }

        .server-btn:hover, .server-btn.active {
            background: linear-gradient(45deg, #00f2fe, #7f00ff);
            color: #ffffff;
            font-weight: bold;
        }

        /* تعديل متجاوب مع الجوالات الصغيرة */
        @media (max-width: 480px) {
            .search-container {
                flex-direction: column; /* تحويلهم فوق بعض في الشاشات الصغيرة جداً لضمان عدم التداخل */
                border-radius: 15px;
            }
            .search-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="SHASHAFLIX Logo" class="logo-img">
        <h1>SHASHAFLIX</h1>
        <p>محرك بحث فوري ووسيط لجلب سيرفرات الأنمي، الأفلام والمسلسلات مباشرة.</p>
    </header>

    <!-- صندوق البحث المصلح -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="اكتب اسم الأنمي أو الفيلم بالإنجليزية (مثل: One Piece)...">
        <button id="searchBtn" class="search-btn">ابحث في فلكس</button>
    </div>

    <div class="results-container">
        <div id="statusMessage" class="status-message">ابدأ بالبحث عن عملك المفضل لعرض السيرفرات الحقيقية...</div>
        
        <div id="playerWrapper" class="player-wrapper">
            <div class="video-container">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
            
            <div class="servers-section-title">السيرفرات المتوفرة للمشاهدة الفورية:</div>
            <div id="serversList" class="servers-list"></div>
        </div>
    </div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', startSearch);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startSearch();
        });

        function startSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const statusMessage = document.getElementById('statusMessage');
            const playerWrapper = document.getElementById('playerWrapper');
            const serversList = document.getElementById('serversList');
            const videoPlayer = document.getElementById('videoPlayer');

            if (!query) {
                alert('الرجاء كتابة اسم العمل أولاً!');
                return;
            }

            // الفلترة الذكية لحماية الشاشة
            const blacklist = ['شرح', 'رياضيات', 'درس', 'استاذ', 'محاضرة'];
            if (blacklist.some(word => query.includes(word))) {
                statusMessage.style.display = 'block';
                statusMessage.innerHTML = '⚠️ نعتذر، هذا المحتوى خارج نطاق المواد الترفيهية لـ SHASHAFLIX.';
                playerWrapper.style.display = 'none';
                return;
            }

            statusMessage.style.display = 'none';
            playerWrapper.style.display = 'block';

            // تحضير النص للبحث المباشر في محركات الرفع العالمية (أسرع وأضمن للأنمي والمسلسلات بدون تعقيد الـ IDs)
            const formattedQuery = encodeURIComponent(query.toLowerCase());

            // ربط مباشر مع أقوى مجمعات بث وسيطة تدعم البحث النصي مباشرة (Query-based Embeds)
            const liveServers = [
                { name: "سيرفر فلكس 1 (ذكي)", url: `https://vidsrc.me/embed/movie?title=${formattedQuery}` },
                { name: "سيرفر فلكس 2 (سريع)", url: `https://embed.su/embed/movie/${formattedQuery}` },
                { name: "سيرفر فلكس 3 (أنمي)", url: `https://vidsrc.to/embed/movie/${formattedQuery}` },
                { name: "سيرفر فلكس 4 (احتياطي)", url: `https://moviesapi.club/movie/${formattedQuery}` }
            ];

            serversList.innerHTML = '';
            videoPlayer.src = liveServers[0].url;

            liveServers.forEach((server, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                if(index === 0) btn.classList.add('active');
                btn.textContent = server.name;
                
                btn.onclick = function() {
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    videoPlayer.src = server.url;
                };
                
                serversList.appendChild(btn);
            });
        }
    </script>
</body>
</html>
