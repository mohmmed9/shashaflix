<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHASHAFLIX | شاشة فلكس الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* الستايل والتصميم متناسق مع ألوان لوجو SHASHAFLIX */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0c0f12; /* خلفية داكنة سينمائية */
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 30px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* تنسيق اللوجو */
        .logo-img {
            max-width: 280px; /* حجم مناسب للوجو */
            height: auto;
            object-fit: contain;
        }

        header h1 {
            color: #00f2fe; /* اللون التركواز المأخوذ من اللوجو */
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        header p {
            color: #a0aec0;
            font-size: 0.95rem;
            max-width: 500px;
            line-height: 1.6;
        }

        /* صندوق البحث الذكي */
        .search-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        .search-input {
            flex: 1;
            padding: 15px 22px;
            border-radius: 30px;
            border: 2px solid #1a202c;
            background-color: #1a202c;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s ease;
        }

        .search-input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .search-btn {
            padding: 0 35px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #4facfe); /* تدرج لوني يشبه انحناءة اللوجو */
            color: #0c0f12;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .search-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        /* منطقة عرض النتائج والمشغل */
        .results-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-message {
            text-align: center;
            color: #718096;
            font-size: 1.1rem;
            padding: 40px;
            border: 1px dashed #1a202c;
            border-radius: 15px;
        }

        /* شاشة عرض الفيديو (الوسيط) */
        .player-wrapper {
            display: none; 
            width: 100%;
            background-color: #1a202c;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid #2d3748;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* أبعاد 16:9 السينمائية */
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* قائمة السيرفرات الخارجية */
        .servers-section-title {
            padding: 15px 20px 0 20px; 
            font-weight: bold; 
            color: #00f2fe;
            font-size: 1.05rem;
        }

        .servers-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 20px;
            background-color: #11151d;
        }

        .server-btn {
            padding: 12px;
            background-color: #1a202c;
            color: #e2e8f0;
            border: 1px solid #2d3748;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: 0.2s ease;
        }

        .server-btn:hover, .server-btn.active {
            background: linear-gradient(45deg, #00f2fe, #7f00ff); /* تدرج يدمج التركواز والبنفسجي مثل تفاصيل اللوجو */
            color: #ffffff;
            border-color: transparent;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="SHASHAFLIX Logo" class="logo-img">
        <h1>SHASHAFLIX</h1>
        <p>محرك بحث ذكي ووسيط خارجي لجلب السيرفرات وروابط المشاهدة مباشرة بدون تخزين ملفات.</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="اكتب اسم الفيلم، المسلسل، أو الأنمي...">
        <button id="searchBtn" class="search-btn">ابحث في فلكس</button>
    </div>

    <div class="results-container">
        <div id="statusMessage" class="status-message">ابدأ بالبحث عن عملك المفضل لعرض السيرفرات الخارجية المتوفرة...</div>
        
        <div id="playerWrapper" class="player-wrapper">
            <div class="video-container">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
            
            <div class="servers-section-title">السيرفرات الخارجية المتوفرة للمشاهدة:</div>
            <div id="serversList" class="servers-list">
                </div>
        </div>
    </div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', startSearch);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startSearch();
        });

        function startSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const statusMessage = document.getElementById('statusMessage');
            const playerWrapper = document.getElementById('playerWrapper');
            const serversList = document.getElementById('serversList');
            const videoPlayer = document.getElementById('videoPlayer');

            if (!query) {
                alert('الرجاء كتابة اسم العمل أولاً!');
                return;
            }

            // نظام الفلترة الذكي (تجنب مقاطع الرياضيات والشروحات)
            const blacklist = ['شرح', 'رياضيات', 'درس', 'استاذ', 'محاضرة', 'قانون', 'تفاضل', 'تكامل'];
            const containsMath = blacklist.some(word => query.includes(word));

            if (containsMath) {
                statusMessage.style.display = 'block';
                statusMessage.innerHTML = '⚠️ نعتذر، هذا المحتوى يبدو تعليمياً وخارج نطاق المواد الترفيهية لـ SHASHAFLIX.';
                playerWrapper.style.display = 'none';
                return;
            }

            statusMessage.style.display = 'none';
            playerWrapper.style.display = 'block';

            const encodedQuery = encodeURIComponent(query);
            
            // مصادر وسيرفرات الفهرسة الخارجية (تعتمد على اسم البحث)
            const mockServers = [
                { name: "سيرفر فلكس 1", url: `https://vidsrc.to/embed/movie/${encodedQuery}` },
                { name: "سيرفر فلكس 2", url: `https://embed.su/embed/movie/${encodedQuery}` },
                { name: "سيرفر فلكس 3", url: `https://moviesapi.club/movie/${encodedQuery}` },
                { name: "سيرفر احتياطي DMCA", url: `https://vidsrc.me/embed/movie?title=${encodedQuery}` }
            ];

            serversList.innerHTML = '';
            videoPlayer.src = mockServers[0].url;

            mockServers.forEach((server, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                if(index === 0) btn.classList.add('active');
                btn.textContent = server.name;
                
                btn.onclick = function() {
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    videoPlayer.src = server.url;
                };
                
                serversList.appendChild(btn);
            });
        }
    </script>
</body>
</html>
