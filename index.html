<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHASHAFLIX | واجهة فلكس الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #141414;
            color: #ffffff;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* شريط التنقل العلوي */
        .navbar {
            padding: 15px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            max-width: 110px;
            height: auto;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 12px;
        }

        .nav-link {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active {
            color: #00f2fe;
            font-weight: bold;
        }

        /* البانر الرئيسي */
        .hero-banner {
            width: 100%;
            height: 40vh;
            background: linear-gradient(to top, #141414 8%, rgba(20,20,20,0.2) 50%, rgba(0,0,0,0.7) 100%), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 4% 20px 4%;
            margin-top: 60px;
        }

        .hero-title {
            font-size: 1.8rem;
            color: #00f2fe;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        /* صندوق البحث */
        .search-wrapper {
            width: 92%;
            max-width: 500px;
            margin: 20px auto;
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 2px solid #282828;
            background-color: #181818;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
            text-align: right;
        }

        .search-input:focus { border-color: #00f2fe; }

        .search-btn {
            padding: 0 20px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #0c0f12;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* قسم المشغل ومحدد الحلقات */
        .player-section {
            display: none;
            width: 92%;
            max-width: 900px;
            margin: 0 auto 30px auto;
            background-color: #181818;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #282828;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .episodes-controls {
            padding: 15px 20px;
            background-color: #181818;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #282828;
        }

        select {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        /* المحتوى والبوسترات */
        .main-container { padding: 0 4%; }
        .section-row { margin-bottom: 30px; }
        .row-title { font-size: 1.15rem; font-weight: bold; color: #fff; margin-bottom: 15px; border-right: 3px solid #00f2fe; padding-right: 8px; }
        
        .posters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .movie-card {
            background-color: #1a202c;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            border: 1px solid #2d3748;
        }

        .movie-card:hover {
            transform: scale(1.04);
            border-color: #00f2fe;
        }

        /* البوستر مع وضع خلفية احتياطية ممتازة */
        .movie-card .poster-box {
            width: 100%;
            height: 195px;
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .movie-card-title {
            padding: 8px;
            font-size: 0.8rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background-color: #181818;
            font-weight: 600;
        }

        .card-badge {
            position: absolute;
            top: 5px; left: 5px;
            background: rgba(0, 0, 0, 0.8);
            color: #00f2fe;
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: bold;
            border-radius: 4px;
            z-index: 2;
            border: 1px solid #00f2fe30;
        }

        @media (max-width: 480px) {
            .logo-img { max-width: 90px; }
            .nav-menu { gap: 8px; }
            .nav-link { font-size: 0.75rem; }
            .posters-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; }
            .movie-card .poster-box { height: 155px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-right">
            <img src="logo.png" alt="SHASHAFLIX" class="logo-img" onclick="showCategory('all')">
            <ul class="nav-menu">
                <li><span class="nav-link active" id="btn-all" onclick="showCategory('all')">الرئيسية</span></li>
                <li><span class="nav-link" id="btn-anime" onclick="showCategory('أنمي')">أنميات</span></li>
                <li><span class="nav-link" id="btn-tv" onclick="showCategory('مسلسل')">مسلسلات</span></li>
                <li><span class="nav-link" id="btn-movie" onclick="showCategory('فيلم')">أفلام</span></li>
            </ul>
        </div>
    </nav>

    <div class="hero-banner">
        <div class="hero-title">SHASHAFLIX PREMIUM</div>
        <div style="max-width: 450px; font-size: 0.85rem; color: #e5e5e5;">مكتبة فلكس الكبرى المحدثة لأشهر وأحدث العروض السينمائية والأنمي المترجم. اختر رغبتك الآن لبدء البث التلقائي.</div>
    </div>

    <!-- صندوق البحث الفوري -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" oninput="liveSearch()" placeholder="ابحث في قائمة فلكس الكبرى الحالية...">
        <button class="search-btn" onclick="liveSearch()">بحث</button>
    </div>

    <!-- المشغل ومحدد الحلقات -->
    <div class="player-section" id="playerSection">
        <div class="video-container">
            <iframe id="mainIframe" src="" allowfullscreen></iframe>
        </div>
        <div class="episodes-controls" id="controlsBox">
            <div style="display:flex; gap:15px; align-items:center;">
                <label>الموسم:</label>
                <select id="seasonSelect" onchange="changeSeason()"></select>
                <label style="margin-right:15px;">الحلقة:</label>
                <select id="episodeSelect" onchange="loadEpisode()"></select>
            </div>
            <div style="font-size:0.8rem; color:#00f2fe;">💡 الترجمة: اضغط على خيار الترجمة (CC) داخل مشغل الفيديو لتفعيل العربية.</div>
        </div>
    </div>

    <div class="main-container">
        <div class="section-row">
            <div class="row-title" id="sectionTitle">أحدث وأقوى المسلسلات والأفلام المضافة حالياً</div>
            <div class="posters-grid" id="mainGrid"></div>
        </div>
    </div>

    <script>
        // داتابيز موسعة ومحدثة لأشهر أعمال 2026 والأنميات الكبرى بروابط صور مستقرة ومؤمنة
        const database = [
            // قسم الأنميات الرائجة جداً
            { id: "21", type: "tv", title: "One Piece", img: "https://images.justwatch.com/poster/305510006/s332/one-piece.webp", badge: "أنمي", seasons: 1, episodesPerSeason: 1100 },
            { id: "1429", type: "tv", title: "Attack on Titan", img: "https://images.justwatch.com/poster/305545283/s332/attack-on-titan.webp", badge: "أنمي", seasons: 4, episodesPerSeason: 25 },
            { id: "94605", type: "tv", title: "Demon Slayer", img: "https://images.justwatch.com/poster/300539121/s332/demon-slayer-kimetsu-no-yaiba.webp", badge: "أنمي", seasons: 4, episodesPerSeason: 11 },
            { id: "114410", type: "tv", title: "Chainsaw Man", img: "https://images.justwatch.com/poster/300587632/s332/chainsaw-man.webp", badge: "أنمي", seasons: 1, episodesPerSeason: 12 },
            { id: "95479", type: "tv", title: "Jujutsu Kaisen", img: "https://images.justwatch.com/poster/263725911/s332/jujutsu-kaisen.webp", badge: "أنمي", seasons: 2, episodesPerSeason: 23 },
            { id: "31911", type: "tv", title: "Fullmetal Alchemist", img: "https://images.justwatch.com/poster/8733221/s332/fullmetal-alchemist-brotherhood.webp", badge: "أنمي", seasons: 1, episodesPerSeason: 64 },

            // قسم المسلسلات الأكثر شهرة وطلباً
            { id: "110316", type: "tv", title: "Wednesday", img: "https://images.justwatch.com/poster/301540302/s332/wednesday.webp", badge: "مسلسل", seasons: 1, episodesPerSeason: 8 },
            { id: "1396", type: "tv", title: "Breaking Bad", img: "https://images.justwatch.com/poster/301540321/s332/breaking-bad.webp", badge: "مسلسل", seasons: 5, episodesPerSeason: 13 },
            { id: "66732", type: "tv", title: "Stranger Things", img: "https://images.justwatch.com/poster/285514032/s332/stranger-things.webp", badge: "مسلسل", seasons: 4, episodesPerSeason: 9 },
            { id: "12526", type: "tv", title: "Malcolm in the Middle", img: "https://images.justwatch.com/poster/259020911/s332/malcolm-in-the-middle.webp", badge: "مسلسل", seasons: 7, episodesPerSeason: 22 },
            { id: "71446", type: "tv", title: "Money Heist", img: "https://images.justwatch.com/poster/251349032/s332/la-casa-de-papel.webp", badge: "مسلسل", seasons: 5, episodesPerSeason: 10 },
            { id: "1399", type: "tv", title: "Game of Thrones", img: "https://images.justwatch.com/poster/259132044/s332/game-of-thrones.webp", badge: "مسلسل", seasons: 8, episodesPerSeason: 10 },

            // قسم أحدث وأشهر الأفلام
            { id: "299534", type: "movie", title: "Avengers: Endgame", img: "https://images.justwatch.com/poster/128181321/s332/avengers-endgame.webp", badge: "فيلم" },
            { id: "157336", type: "movie", title: "Interstellar", img: "https://images.justwatch.com/poster/41413921/s332/interstellar.webp", badge: "فيلم" },
            { id: "19995", type: "movie", title: "Avatar", img: "https://images.justwatch.com/poster/302434011/s332/avatar-the-way-of-water.webp", badge: "فيلم" },
            { id: "475557", type: "movie", title: "Joker", img: "https://images.justwatch.com/poster/148113011/s332/joker.webp", badge: "فيلم" },
            { id: "27205", type: "movie", title: "Inception", img: "https://images.justwatch.com/poster/181130211/s332/inception.webp", badge: "فيلم" },
            { id: "603", type: "movie", title: "The Matrix", img: "https://images.justwatch.com/poster/251020411/s332/the-matrix.webp", badge: "فيلم" }
        ];

        let currentCategory = "all";
        let currentShowData = null;

        renderGrid(database);

        function renderGrid(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            if(data.length === 0) {
                grid.innerHTML = "<div style='grid-column:1/-1; text-align:center; color:#718096; padding:20px;'>لم نجد نتائج مطابقة لبحثك.</div>";
                return;
            }
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <span class="card-badge">${item.badge}</span>
                    <div class="poster-box">
                        <img src="${item.img}" alt="${item.title}" loading="lazy">
                    </div>
                    <div class="movie-card-title">${item.title}</div>
                `;
                card.onclick = () => startPlay(item);
                grid.appendChild(card);
            });
        }

        function showCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            
            let filtered = database;
            if (category === 'all') {
                document.getElementById('btn-all').classList.add('active');
                document.getElementById('sectionTitle').textContent = "أحدث وأقوى المسلسلات والأفلام المضافة حالياً";
            } else {
                if(category === 'أنمي') document.getElementById('btn-anime').classList.add('active');
                if(category === 'مسلسل') document.getElementById('btn-tv').classList.add('active');
                if(category === 'فيلم') document.getElementById('btn-movie').classList.add('active');
                document.getElementById('sectionTitle').textContent = `قسم الـ ${category}ات`;
                filtered = database.filter(item => item.badge === category);
            }
            renderGrid(filtered);
            document.getElementById('searchInput').value = "";
        }

        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let baseItems = database;
            
            if (currentCategory !== 'all') {
                baseItems = database.filter(item => item.badge === currentCategory);
            }

            const results = baseItems.filter(item => item.title.toLowerCase().includes(query));
            renderGrid(results);
        }

        function startPlay(item) {
            const playerSection = document.getElementById('playerSection');
            const controlsBox = document.getElementById('controlsBox');
            const iframe = document.getElementById('mainIframe');
            
            playerSection.style.display = 'block';
            window.scrollTo({ top: playerSection.offsetTop - 90, behavior: 'smooth' });

            if (item.type === 'movie') {
                controlsBox.style.display = 'none';
                iframe.src = `https://vidsrc.to/embed/movie/${item.id}`;
            } else {
                controlsBox.style.display = 'flex';
                currentShowData = item;

                const seasonSelect = document.getElementById('seasonSelect');
                seasonSelect.innerHTML = "";
                for (let i = 1; i <= item.seasons; i++) {
                    seasonSelect.innerHTML += `<option value="${i}">الموسم ${i}</option>`;
                }
                changeSeason();
            }
        }

        function changeSeason() {
            const episodeSelect = document.getElementById('episodeSelect');
            episodeSelect.innerHTML = "";
            for (let i = 1; i <= currentShowData.episodesPerSeason; i++) {
                episodeSelect.innerHTML += `<option value="${i}">الحلقة ${i}</option>`;
            }
            loadEpisode();
        }

        function loadEpisode() {
            const iframe = document.getElementById('mainIframe');
            const season = document.getElementById('seasonSelect').value;
            const episode = document.getElementById('episodeSelect').value;
            iframe.src = `https://vidsrc.to/embed/tv/${currentShowData.id}/${season}/${episode}`;
        }
    </script>
</body>
</html>
