<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHASHAFLIX | واجهة فلكس الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #141414;
            color: #ffffff;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* إصلاح كامل لشريط التنقل العلوي في الجوال لضمان عدم تداخل النصوص */
        .navbar {
            padding: 15px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            max-width: 110px;
            height: auto;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 12px;
        }

        .nav-link {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active {
            color: #00f2fe;
            font-weight: bold;
        }

        /* البانر الرئيسي السينمائي */
        .hero-banner {
            width: 100%;
            height: 42vh;
            background: linear-gradient(to top, #141414 8%, rgba(20,20,20,0.2) 50%, rgba(0,0,0,0.7) 100%), 
                        url('https://image.tmdb.org/t/p/original/69w831Z6MdnG346wYw66A7v7g2z.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 4% 20px 4%;
            margin-top: 60px;
        }

        .hero-title {
            font-size: 1.8rem;
            color: #00f2fe;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        /* صندوق البحث المطور والمحاذي صح */
        .search-wrapper {
            width: 92%;
            max-width: 500px;
            margin: 20px auto;
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 2px solid #282828;
            background-color: #181818;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
            text-align: right;
        }

        .search-input:focus { border-color: #00f2fe; }

        .search-btn {
            padding: 0 20px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #0c0f12;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* قسم المشغل ومحدد الحلقات */
        .player-section {
            display: none;
            width: 92%;
            max-width: 900px;
            margin: 0 auto 30px auto;
            background-color: #181818;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #282828;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .episodes-controls {
            padding: 15px 20px;
            background-color: #181818;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #282828;
        }

        select {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        /* المحتوى والبوسترات */
        .main-container { padding: 0 4%; }
        .section-row { margin-bottom: 30px; }
        .row-title { font-size: 1.15rem; font-weight: bold; color: #fff; margin-bottom: 15px; border-right: 3px solid #00f2fe; padding-right: 8px; }
        
        .posters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .movie-card {
            background-color: #181818;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            border: 1px solid #282828;
        }

        .movie-card:hover {
            transform: scale(1.04);
            border-color: #00f2fe;
        }

        .movie-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
        }

        .movie-card-title {
            padding: 6px;
            font-size: 0.78rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-badge {
            position: absolute;
            top: 5px; left: 5px;
            background: rgba(0, 0, 0, 0.75);
            color: #00f2fe;
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid #00f2fe30;
        }

        @media (max-width: 480px) {
            .logo-img { max-width: 90px; }
            .nav-menu { gap: 8px; }
            .nav-link { font-size: 0.75rem; }
            .posters-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
            .movie-card img { height: 145px; }
        }
    </style>
</head>
<body>

    <!-- البار العلوي المصلح أبعاده للجوال -->
    <nav class="navbar">
        <div class="nav-right">
            <img src="logo.png" alt="SHASHAFLIX" class="logo-img" onclick="showCategory('all')">
            <ul class="nav-menu">
                <li><span class="nav-link active" id="btn-all" onclick="showCategory('all')">الرئيسية</span></li>
                <li><span class="nav-link" id="btn-anime" onclick="showCategory('أنمي')">أنميات</span></li>
                <li><span class="nav-link" id="btn-tv" onclick="showCategory('مسلسل')">مسلسلات</span></li>
                <li><span class="nav-link" id="btn-movie" onclick="showCategory('فيلم')">أفلام</span></li>
            </ul>
        </div>
    </nav>

    <div class="hero-banner">
        <div class="hero-title">ONE PIECE</div>
        <div style="max-width: 450px; font-size: 0.85rem; color: #e5e5e5;">تابع مغامرات مونكي دي لوفي في سعيه ليكون ملك القراصنة. اضغط على أي عمل بالأسفل لتشغيل الحلقات والسيرفرات الحية فوراً ومجاناً.</div>
    </div>

    <!-- صندوق البحث الفوري الداخلي المضمون -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" oninput="liveSearch()" placeholder="ابحث عن العروض (مثال: One Piece, Wednesday)...">
        <button class="search-btn" onclick="liveSearch()">بحث</button>
    </div>

    <!-- المشغل الذكي ومحدد الحلقات -->
    <div class="player-section" id="playerSection">
        <div class="video-container">
            <iframe id="mainIframe" src="" allowfullscreen></iframe>
        </div>
        <div class="episodes-controls" id="controlsBox">
            <div style="display:flex; gap:15px; align-items:center;">
                <label>الموسم:</label>
                <select id="seasonSelect" onchange="changeSeason()"></select>
                <label style="margin-right:15px;">الحلقة:</label>
                <select id="episodeSelect" onchange="loadEpisode()"></select>
            </div>
            <div style="font-size:0.8rem; color:#00f2fe;">💡 الترجمة العربية مدمجة تلقائياً داخل المشغل (اضغط على CC أو زر الترجمة).</div>
        </div>
    </div>

    <!-- منطقة عرض العروض والأقسام -->
    <div class="main-container">
        <div class="section-row">
            <div class="row-title" id="sectionTitle">أحدث وأقوى المسلسلات والأفلام المضافة حالياً</div>
            <div class="posters-grid" id="mainGrid"></div>
        </div>
    </div>

    <script>
        // قاعدة بيانات ضخمة ومدمجة مباشرة لضمان العمل على Vercel بدون أخطاء اتصال نهائياً
        const database = [
            // قسم الأنمي
            { id: "21", type: "tv", title: "One Piece", img: "https://image.tmdb.org/t/p/w500/v9nG0v8aG2Eg8v86I3ubsiZa6vK.jpg", badge: "أنمي", seasons: 1, episodesPerSeason: 1100 },
            { id: "31911", type: "tv", title: "Fullmetal Alchemist: Brotherhood", img: "https://image.tmdb.org/t/p/w500/5Zg60m0g2v7sv6jR9Uf3dDlxZpZ.jpg", badge: "أنمي", seasons: 1, episodesPerSeason: 64 },
            { id: "94605", type: "tv", title: "Demon Slayer (Kimetsu no Yaiba)", img: "https://image.tmdb.org/t/p/w500/3w8S57v3gYMaYfdfFt76Qv5QwbX.jpg", badge: "أنمي", seasons: 4, episodesPerSeason: 11 },
            { id: "1429", type: "tv", title: "Attack on Titan", img: "https://image.tmdb.org/t/p/w500/h6dt7w4gMaMa7gXW5Qv5QwbX.jpg", badge: "أنمي", seasons: 4, episodesPerSeason: 25 },
            { id: "209867", type: "tv", title: "Frieren: Beyond Journey's End", img: "https://image.tmdb.org/t/p/w500/or066gT60Bw7u6vYg90uCj7gK96.jpg", badge: "أنمي", seasons: 1, episodesPerSeason: 28 },
            
            // قسم المسلسلات العالمية
            { id: "110316", type: "tv", title: "Wednesday", img: "https://image.tmdb.org/t/p/w500/9PFonBhy46wcEpb62Y2u6Glm36G.jpg", badge: "مسلسل", seasons: 1, episodesPerSeason: 8 },
            { id: "1396", type: "tv", title: "Breaking Bad", img: "https://image.tmdb.org/t/p/w500/ztkUQv6v1NZv6J6wSu99Zg68uGE.jpg", badge: "مسلسل", seasons: 5, episodesPerSeason: 13 },
            { id: "66732", type: "tv", title: "Stranger Things", img: "https://image.tmdb.org/t/p/w500/49w0wGv7gMa7gXW5Qv5QwbX.jpg", badge: "مسلسل", seasons: 4, episodesPerSeason: 9 },
            { id: "82856", type: "tv", title: "The Mandalorian", img: "https://image.tmdb.org/t/p/w500/e9t0wGv7gMa7gXW5Qv5QwbX.jpg", badge: "مسلسل", seasons: 3, episodesPerSeason: 8 },
            { id: "71446", type: "tv", title: "Money Heist (La Casa de Papel)", img: "https://image.tmdb.org/t/p/w500/reKs8aa99Zg68uGE49w0wGv7gMa.jpg", badge: "مسلسل", seasons: 5, episodesPerSeason: 10 },

            // قسم الأفلام السينمائية
            { id: "299534", type: "movie", title: "Avengers: Endgame", img: "https://image.tmdb.org/t/p/w500/or066gT60Bw7u6vYg90uCj7gK96.jpg", badge: "فيلم" },
            { id: "157336", type: "movie", title: "Interstellar", img: "https://image.tmdb.org/t/p/w500/gEU2vW9Z7786v3t2gGwYZvV6jR9.jpg", badge: "فيلم" },
            { id: "19995", type: "movie", title: "Avatar", img: "https://image.tmdb.org/t/p/w500/kyeqW6vX4w8uW6fjoH6dJhuxv6d.jpg", badge: "فيلم" },
            { id: "515001", type: "movie", title: "Jojo Rabbit", img: "https://image.tmdb.org/t/p/w500/7Gs7vgt6wZ9878gGwW4uXmYw4pX.jpg", badge: "فيلم" },
            { id: "475557", type: "movie", title: "Joker", img: "https://image.tmdb.org/t/p/w500/udDcl7n4v9v3bZ9Uf3dDlxZpZ.jpg", badge: "فيلم" },
            { id: "27205", type: "movie", title: "Inception", img: "https://image.tmdb.org/t/p/w500/edv5CZvYg90uCj7gK96vW9Z77.jpg", badge: "فيلم" }
        ];

        let currentCategory = "all";
        let currentShowData = null;

        // تشغيل العرض عند فتح المنصة لأول مرة
        renderGrid(database);

        function renderGrid(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            if(data.length === 0) {
                grid.innerHTML = "<div style='grid-column:1/-1; text-align:center; color:#718096; padding:20px;'>لم نجد نتائج مطابقة لبحثك.</div>";
                return;
            }
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <span class="card-badge">${item.badge}</span>
                    <img src="${item.img}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/500x750?text=SHASHAFLIX'">
                    <div class="movie-card-title">${item.title}</div>
                `;
                card.onclick = () => startPlay(item);
                grid.appendChild(card);
            });
        }

        // دالة الفلترة والتنقل بين الأقسام
        function showCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            
            let filtered = database;
            if (category === 'all') {
                document.getElementById('btn-all').classList.add('active');
                document.getElementById('sectionTitle').textContent = "أحدث وأقوى المسلسلات والأفلام المضافة حالياً";
            } else {
                if(category === 'أنمي') document.getElementById('btn-anime').classList.add('active');
                if(category === 'مسلسل') document.getElementById('btn-tv').classList.add('active');
                if(category === 'فيلم') document.getElementById('btn-movie').classList.add('active');
                document.getElementById('sectionTitle').textContent = `قسم الـ ${category}ات`;
                filtered = database.filter(item => item.badge === category);
            }
            renderGrid(filtered);
            document.getElementById('searchInput').value = ""; // تنظيف البحث
        }

        // دالة البحث الفوري الداخلي المضمون
        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let baseItems = database;
            
            if (currentCategory !== 'all') {
                baseItems = database.filter(item => item.badge === currentCategory);
            }

            const results = baseItems.filter(item => item.title.toLowerCase().includes(query));
            renderGrid(results);
        }

        // تشغيل البث وإظهار المواسم والحلقات المضمونة بدون شاشة سوداء
        function startPlay(item) {
            const playerSection = document.getElementById('playerSection');
            const controlsBox = document.getElementById('controlsBox');
            const iframe = document.getElementById('mainIframe');
            
            playerSection.style.display = 'block';
            window.scrollTo({ top: playerSection.offsetTop - 90, behavior: 'smooth' });

            if (item.type === 'movie') {
                controlsBox.style.display = 'none';
                iframe.src = `https://vidsrc.to/embed/movie/${item.id}`;
            } else {
                controlsBox.style.display = 'flex';
                currentShowData = item;

                const seasonSelect = document.getElementById('seasonSelect');
                seasonSelect.innerHTML = "";
                for (let i = 1; i <= item.seasons; i++) {
                    seasonSelect.innerHTML += `<option value="${i}">الموسم ${i}</option>`;
                }
                changeSeason();
            }
        }

        function changeSeason() {
            const episodeSelect = document.getElementById('episodeSelect');
            episodeSelect.innerHTML = "";
            for (let i = 1; i <= currentShowData.episodesPerSeason; i++) {
                episodeSelect.innerHTML += `<option value="${i}">الحلقة ${i}</option>`;
            }
            loadEpisode();
        }

        function loadEpisode() {
            const iframe = document.getElementById('mainIframe');
            const season = document.getElementById('seasonSelect').value;
            const episode = document.getElementById('episodeSelect').value;
            
            // ربط مباشر بالسيرفر العالمي المفتوح والمجاني عبر الـ ID الدقيق للحلقة
            iframe.src = `https://vidsrc.to/embed/tv/${currentShowData.id}/${season}/${episode}`;
        }
    </script>
</body>
</html>
