<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHASHAFLIX | شاشة فلكس الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0c0f12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 25px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            max-width: 220px;
            height: auto;
            object-fit: contain;
        }

        header h1 {
            color: #00f2fe;
            font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        /* صندوق البحث */
        .search-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #1a202c;
            background-color: #1a202c;
            color: #fff;
            font-size: 1rem;
            outline: none;
            text-align: right;
        }

        .search-btn {
            padding: 0 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #0c0f12;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* منطقة المشغل */
        .results-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .player-wrapper {
            display: none; 
            width: 100%;
            background-color: #1a202c;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #2d3748;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .servers-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            padding: 15px;
            background-color: #11151d;
        }

        .server-btn {
            padding: 10px;
            background-color: #1a202c;
            color: #e2e8f0;
            border: 1px solid #2d3748;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
        }

        .server-btn.active {
            background: linear-gradient(45deg, #00f2fe, #7f00ff);
            color: #ffffff;
        }

        /* ستايل أقسام الأفلام والمسلسلات في الصفحة الرئيسية */
        .main-content {
            width: 100%;
            max-width: 1000px;
            margin-top: 10px;
        }

        .section-title {
            color: #00f2fe;
            font-size: 1.3rem;
            margin: 20px 0 15px 0;
            font-weight: bold;
            border-right: 4px solid #7f00ff;
            padding-right: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: #1a202c;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #2d3748;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #00f2fe;
        }

        .card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
        }

        .card-title {
            padding: 8px;
            font-size: 0.85rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #7f00ff;
            color: white;
            padding: 2px 8px;
            font-size: 0.7rem;
            border-radius: 5px;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .search-container { flex-direction: column; }
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .card img { height: 160px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="SHASHAFLIX Logo" class="logo-img">
        <h1>SHASHAFLIX</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن فيلم أو مسلسل بالإنجليزية...">
        <button id="searchBtn" class="search-btn">بحث</button>
    </div>

    <div class="results-container">
        <div id="statusMessage" style="text-align:center; color:#a0aec0; display:none;">🔍 جاري تشغيل السيرفرات...</div>
        <div id="playerWrapper" class="player-wrapper">
            <div class="video-container">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
            <div style="padding: 10px 15px 0 15px; font-weight: bold; color: #00f2fe;">سيرفرات البث المتوفرة:</div>
            <div id="serversList" class="servers-list"></div>
        </div>
    </div>

    <div class="main-content">
        
        <div class="section-title">أحدث مسلسلات الأنمي والدراما</div>
        <div class="grid-container" id="showsGrid"></div>

        <div class="section-title">أفلام ومسلسلات مقترحة</div>
        <div class="grid-container" id="moviesGrid"></div>
        
    </div>

    <script>
        // داتا الصفحة الرئيسية (أفلام ومسلسلات حقيقية مع الـ IDs والبوسترات الرسمية لها)
        const mainShows = [
            { id: "21", type: "tv", title: "One Piece", img: "https://image.tmdb.org/t/p/w500/v9nG0v8aG2Eg8v86I3ubsiZa6vK.jpg", badge: "أنمي" },
            { id: "31911", type: "tv", title: "Fullmetal Alchemist", img: "https://image.tmdb.org/t/p/w500/29906666aZ9877bZ9XfW4pW8U3d.jpg", badge: "أنمي" },
            { id: "110316", type: "tv", title: "Wednesday", img: "https://image.tmdb.org/t/p/w500/9PFonBhy46wcEpb62Y2u6Glm36G.jpg", badge: "مسلسل" },
            { id: "1396", type: "tv", title: "Breaking Bad", img: "https://image.tmdb.org/t/p/w500/ztkUQv6v1NZv6J6wSu99Zg68uGE.jpg", badge: "مسلسل" }
        ];

        const mainMovies = [
            { id: "299534", type: "movie", title: "Avengers: Endgame", img: "https://image.tmdb.org/t/p/w500/or066gT60Bw7u6vYg90uCj7gK96.jpg", badge: "فيلم" },
            { id: "157336", type: "movie", title: "Interstellar", img: "https://image.tmdb.org/t/p/w500/gEU2vW9Z7786v3t2gGwYZvV6jR9.jpg", badge: "فيلم" },
            { id: "19995", type: "movie", title: "Avatar", img: "https://image.tmdb.org/t/p/w500/kyeqW6vX4w8uW6fjoH6dJhuxv6d.jpg", badge: "فيلم" },
            { id: "515001", type: "movie", title: "Jojo Rabbit", img: "https://image.tmdb.org/t/p/w500/7Gs7vgt6wZ9878gGwW4uXmYw4pX.jpg", badge: "فيلم" }
        ];

        // عرض العناصر تلقائياً في الواجهة
        displayCards(mainShows, 'showsGrid');
        displayCards(mainMovies, 'moviesGrid');

        function displayCards(items, gridId) {
            const grid = document.getElementById(gridId);
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="badge">${item.badge}</span>
                    <img src="${item.img}" alt="${item.title}">
                    <div class="card-title">${item.title}</div>
                `;
                // عند الضغط على الكارد يشتغل فوراً بالـ ID المضمون
                card.onclick = () => playMedia(item.id, item.type);
                grid.appendChild(card);
            });
        }

        // تشغيل البث المباشر
        function playMedia(id, type) {
            const playerWrapper = document.getElementById('playerWrapper');
            const videoPlayer = document.getElementById('videoPlayer');
            const serversList = document.getElementById('serversList');

            playerWrapper.style.display = 'block';
            window.scrollTo({ top: 300, behavior: 'smooth' });

            // السيرفرات الحقيقية المضمونة المشغلة بالـ ID
            let servers = [];
            if (type === 'movie') {
                servers = [
                    { name: "سيرفر فلكس 1", url: `https://vidsrc.to/embed/movie/${id}` },
                    { name: "سيرفر فلكس 2", url: `https://embed.su/embed/movie/${id}` }
                ];
            } else {
                // للمسلسلات والأنمي تشغيل الحلقة الأولى تلقائياً كمثال ثابت
                servers = [
                    { name: "سيرفر فلكس 1", url: `https://vidsrc.to/embed/tv/${id}/1/1` },
                    { name: "سيرفر فلكس 2", url: `https://embed.su/embed/tv/${id}/1/1` }
                ];
            }

            videoPlayer.src = servers[0].url;
            serversList.innerHTML = '';

            servers.forEach((server, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                if(index === 0) btn.classList.add('active');
                btn.textContent = server.name;
                btn.onclick = () => {
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    videoPlayer.src = server.url;
                };
                serversList.appendChild(btn);
            });
        }

        // تفعيل زر البحث العادي كخيار احتياطي
        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = document.getElementById('searchInput').value.trim();
            if(q) alert('اضغط على أحد بوسترات الأفلام والأنمي بالأسفل لتجربة التشغيل الفوري المضمون!');
        });
    </script>
</body>
</html>
